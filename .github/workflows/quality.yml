name: Quality

on:
  pull_request:
    branches: [staging, main]
  push:
    branches: [staging, main]

concurrency:
  group: quality-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Validate agent-control layer
        run: corepack pnpm run agent:validate

      - name: Validate development plan
        run: corepack pnpm run plan:validate

      - name: Run available application quality scripts
        run: |
          set -euo pipefail
          node <<'EOF'
          const { readFileSync, existsSync } = require("node:fs");
          const { spawnSync } = require("node:child_process");

          const pkg = JSON.parse(readFileSync("package.json", "utf8"));
          const scripts = pkg.scripts ?? {};
          const optional = ["lint", "typecheck", "test", "build"];

          function run(scriptName) {
            console.log(`::group::pnpm run ${scriptName}`);
            const result = spawnSync("corepack", ["pnpm", "run", scriptName], {
              stdio: "inherit",
              env: process.env,
            });
            console.log("::endgroup::");
            if (result.status !== 0) {
              console.error(`Script "${scriptName}" failed with exit code ${result.status ?? 1}`);
              process.exit(result.status ?? 1);
            }
          }

          for (const name of optional) {
            if (typeof scripts[name] === "string") {
              run(name);
            } else {
              console.log(`NOT AVAILABLE: ${name} (script not present in package.json)`);
            }
          }

          if (!existsSync("package.json")) {
            console.error("package.json is missing");
            process.exit(1);
          }
          EOF
